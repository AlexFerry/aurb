name: Update Roblox Offsets

permissions:
  contents: write

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run converter
        run: |
          python scripts/convert.py

      - name: Commit changes
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "offset-bot"
          git add output/offsets.json
          git commit -m "auto update offsets" || echo "no changes"
          git push
