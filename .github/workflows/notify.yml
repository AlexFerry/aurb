name: Notify Discord on Update

on:
  push:
    paths:
      - 'output/offsets.json'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Generate message and send to Discord
        run: |
          export LANG=C.UTF-8

          sudo apt-get update -y
          sudo apt-get install -y jq

          export TZ='America/Sao_Paulo'
          DATE=$(date +'%d/%m')

          MESSAGES=(
            "[+] Otimização geral de desempenho interno."
            "[+] Refatoração de módulos críticos do sistema."
            "[+] Melhorias na estabilidade em execução prolongada."
            "[+] Ajustes no gerenciamento de memória."
            "[+] Aprimoramento dos métodos de segurança."
            "[+] Redução de inconsistências em cenários específicos."
            "[+] Melhorias internas no sistema de detecção."
            "[+] Melhorias estruturais no código base."
          )

          # Quantidade aleatória de mensagens (0 a 3)
          COUNT=$((RANDOM % 4))
          RANDOM_MSGS=$(printf "%s\n" "${MESSAGES[@]}" | shuf | head -n $COUNT)

          CONTENT=$(cat <<EOF
          \`\`\`
          ⏹️ Legit Roblox [UPDATED ${DATE}]
          
          [+] Compatibilidade com a nova versão do jogo.
          ${RANDOM_MSGS}
          \`\`\`
          [**〔 COMPRAR 〕**](https://discord.com/channels/1369186271196483686/1482920072661045288) | [**〔 DOWNLOAD 〕**](https://discord.com/channels/1369186271196483686/1371936693678113001)  | [**〔 SUPORTE 〕**](https://discord.com/channels/1369186271196483686/1412587930677018784)
          EOF
          )

          JSON=$(jq -n --arg content "$CONTENT" '{content: $content}')

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$JSON" \
               ${{ secrets.DISCORD_WEBHOOK }}
