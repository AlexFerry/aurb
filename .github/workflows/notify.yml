name: Notify Discord on Update

on:
  push:
    paths:
      - 'output/offsets.json'

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Generate message and send to Discord
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq

          DATE=$(date +'%d/%m')

          MESSAGES=(
            "[+] Otimização geral de desempenho interno."
            "[+] Refatoração de módulos críticos do sistema."
            "[+] Melhorias na estabilidade em execução prolongada."
            "[+] Ajustes no gerenciamento de memória."
            "[+] Aprimoramento dos métodos de segurança."
            "[+] Redução de inconsistências em cenários específicos."
            "[+] Melhorias internas no sistema de detecção."
            "[+] Melhorias estruturais no código base."
          )

          RANDOM_MSGS=$(printf "%s\n" "${MESSAGES[@]}" | shuf | head -n 3)

          CONTENT=$(printf "👑 VIPER CS2 [UPDATED %s]\n\n[+] Compatibilidade com a nova versão do jogo.\n%s\n" "$DATE" "$RANDOM_MSGS")

          JSON=$(jq -n \
            --arg content "$CONTENT" \
            --arg download "https://discord.com/channels/1369186271196483686/1371936693678113001" \
            --arg buy "https://discord.com/channels/1369186271196483686/1482920072661045288" \
            '{
              content: $content,
              components: [
                {
                  type: 1,
                  components: [
                    {
                      type: 2,
                      label: "⬇️ Download",
                      style: 5,
                      url: $download
                    },
                    {
                      type: 2,
                      label: "💰 Comprar",
                      style: 5,
                      url: $buy
                    }
                  ]
                }
              ]
            }')

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$JSON" \
               ${{ secrets.DISCORD_WEBHOOK }}
